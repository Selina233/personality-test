<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体验模式统计 - 人格测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .stat-card {
      background: linear-gradient(135deg, #6c8d71 0%, #4d6a53 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-subtitle {
      font-size: 12px;
      opacity: 0.8;
    }

    .info {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #6c8d71;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .loading {
      text-align: center;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 体验模式统计</h1>

    <div class="stat-card">
      <div class="stat-label">本设备体验次数</div>
      <div class="stat-value" id="count">-</div>
      <div class="stat-subtitle">基于浏览器localStorage</div>
    </div>

    <div class="info">
      <p><strong>📝 统计说明：</strong></p>
      <ul style="margin-top:10px; margin-left:20px;">
        <li>此统计基于浏览器localStorage，只记录本设备访问次数</li>
        <li>不同设备/浏览器的统计相互独立</li>
        <li>清除浏览器数据会重置计数</li>
        <li>体验模式不收集用户信息，完全匿名</li>
      </ul>
      <p style="margin-top:15px;"><strong>💡 如需查看全局统计：</strong></p>
      <p style="margin-top:5px;">建议在GitHub Pages部署后使用<a href="https://analytics.google.com/" target="_blank" style="color:#6c8d71;">Google Analytics</a>获取完整访问数据。</p>
    </div>

    <div style="text-align:center;">
      <a href="index.html" class="btn">返回测试页面</a>
    </div>
  </div>

  <script>
    // 加载本地统计数据
    function loadStats() {
      try {
        const count = parseInt(localStorage.getItem('experience-mode-count') || '0');
        document.getElementById('count').textContent = count.toLocaleString();
      } catch (e) {
        console.error('加载统计失败:', e);
        document.getElementById('count').textContent = '0';
      }
    }

    // 页面加载时获取统计
    loadStats();
  </script>
</body>
</html>
