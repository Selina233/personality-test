<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji转像素画生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      font-size: 36px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.9);
      margin-bottom: 30px;
      font-size: 18px;
    }

    .controls {
      background: white;
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .btn-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-success {
      background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
      color: white;
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(86, 171, 47, 0.4);
    }

    .btn-info {
      background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
      color: white;
    }

    .btn-info:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(33, 147, 176, 0.4);
    }

    .info-box {
      padding: 20px;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      border-radius: 12px;
      border-left: 5px solid #ff6b6b;
    }

    .info-box h3 {
      margin-bottom: 10px;
      color: #333;
    }

    .info-box p {
      color: #555;
      line-height: 1.6;
    }

    .progress {
      margin-top: 15px;
      height: 8px;
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      text-align: center;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }

    .pixel-canvas {
      margin: 15px auto;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin: 15px 0 10px;
      font-size: 15px;
      color: #333;
      line-height: 1.4;
    }

    .emoji-display {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .download-btn {
      margin-top: 12px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .download-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
    }

    .stats {
      text-align: center;
      color: white;
      font-size: 18px;
      margin-top: 20px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Emoji → 像素画转换器</h1>
    <p class="subtitle">将动物 Emoji 转换为精美的像素画 SVG</p>

    <div class="controls">
      <div class="btn-group">
        <button class="btn-primary" onclick="generateAll()">🎨 生成所有像素画</button>
        <button class="btn-success" onclick="downloadAllSVG()">📦 下载所有 SVG</button>
        <button class="btn-info" onclick="downloadAllPNG()">🖼️ 下载所有 PNG</button>
      </div>

      <div class="info-box">
        <h3>✨ 功能说明</h3>
        <p>
          这个工具会将 Emoji 渲染到画布上，然后转换为像素画风格的 SVG 图片。
          每个动物都会生成独特的像素化效果。点击"生成所有像素画"开始！
        </p>
      </div>

      <div class="progress" id="progress">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="gallery" id="gallery"></div>
  </div>

  <script>
    const animals = [
      {"name": "深海概率灯塔水母", "emoji": "🪼"},
      {"name": "拟态社交蓝环章鱼", "emoji": "🐙"},
      {"name": "记忆反刍驯鹿", "emoji": "🦌"},
      {"name": "结构寄生管虫", "emoji": "🪱"},
      {"name": "情绪共振北极狼", "emoji": "🐺"},
      {"name": "惊跳反应小羚羊", "emoji": "🦌"},
      {"name": "瞬时绽放凤尾蝶", "emoji": "🦋"},
      {"name": "织网结构黑寡妇", "emoji": "🕷️"},
      {"name": "码头哲学信天翁", "emoji": "🕊️"},
      {"name": "冷血航行虎鲸", "emoji": "🐋"},
      {"name": "快乐扩散海獭", "emoji": "🦦"},
      {"name": "透明情绪玻璃鱼", "emoji": "🐟"},
      {"name": "深海信息抹香鲸", "emoji": "🐳"},
      {"name": "边界消融海月水母", "emoji": "🪼"},
      {"name": "现实耐受蟑螂王", "emoji": "🪳"},
      {"name": "风暴预感雨燕", "emoji": "🐦"},
      {"name": "秩序筑巢角雕", "emoji": "🦅"},
      {"name": "孤岛进化腔棘鱼", "emoji": "🐟"},
      {"name": "群体导航帝企鹅", "emoji": "🐧"},
      {"name": "幻觉捕食螳螂虾", "emoji": "🦐"},
      {"name": "即时情绪火烈鸟", "emoji": "🦩"},
      {"name": "静默蓄能豹猫", "emoji": "🐆"},
      {"name": "意义过载白鲸", "emoji": "🐋"},
      {"name": "边缘试探鬣狗", "emoji": "🐕"},
      {"name": "深层共振海参", "emoji": "🪱"},
      {"name": "路径依赖骆驼蛛", "emoji": "🕷️"},
      {"name": "高空观测秃鹫", "emoji": "🦅"},
      {"name": "碎片收集寄居蟹", "emoji": "🦀"},
      {"name": "规则温顺水豚", "emoji": "🐹"},
      {"name": "压力转化独角鲸", "emoji": "🐋"},
      {"name": "随机跃迁飞鱼", "emoji": "🐟"}
    ];

    let generatedSVGs = {};

    // Emoji 转像素画
    function emojiToPixelArt(emoji, size = 128, pixelSize = 8) {
      return new Promise((resolve) => {
        // 创建临时 canvas
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = size;
        tempCanvas.height = size;
        const tempCtx = tempCanvas.getContext('2d');

        // 绘制 emoji
        tempCtx.font = `${size * 0.75}px Arial`;
        tempCtx.textAlign = 'center';
        tempCtx.textBaseline = 'middle';
        tempCtx.fillText(emoji, size / 2, size / 2);

        // 获取像素数据
        const imageData = tempCtx.getImageData(0, 0, size, size);
        const pixels = imageData.data;

        // 降低分辨率（像素化）
        const pixelGrid = Math.floor(size / pixelSize);
        const pixelatedData = [];

        for (let y = 0; y < pixelGrid; y++) {
          for (let x = 0; x < pixelGrid; x++) {
            let r = 0, g = 0, b = 0, a = 0, count = 0;

            // 采样每个像素块
            for (let py = 0; py < pixelSize; py++) {
              for (let px = 0; px < pixelSize; px++) {
                const i = ((y * pixelSize + py) * size + (x * pixelSize + px)) * 4;
                if (pixels[i + 3] > 0) {
                  r += pixels[i];
                  g += pixels[i + 1];
                  b += pixels[i + 2];
                  a += pixels[i + 3];
                  count++;
                }
              }
            }

            if (count > 0) {
              pixelatedData.push({
                x: x * pixelSize,
                y: y * pixelSize,
                r: Math.round(r / count),
                g: Math.round(g / count),
                b: Math.round(b / count),
                a: a / count / 255
              });
            }
          }
        }

        resolve({ pixels: pixelatedData, size, pixelSize });
      });
    }

    // 生成 SVG
    function pixelDataToSVG(pixelData) {
      const { pixels, size, pixelSize } = pixelData;

      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
      svg += `<rect width="${size}" height="${size}" fill="transparent"/>`;

      pixels.forEach(pixel => {
        const color = `rgba(${pixel.r}, ${pixel.g}, ${pixel.b}, ${pixel.a})`;
        svg += `<rect x="${pixel.x}" y="${pixel.y}" width="${pixelSize}" height="${pixelSize}" fill="${color}" shape-rendering="crispEdges"/>`;
      });

      svg += '</svg>';
      return svg;
    }

    // 生成所有动物
    async function generateAll() {
      const gallery = document.getElementById('gallery');
      const progress = document.getElementById('progress');
      const progressBar = document.getElementById('progress-bar');
      const stats = document.getElementById('stats');

      gallery.innerHTML = '';
      generatedSVGs = {};
      progress.style.display = 'block';

      for (let i = 0; i < animals.length; i++) {
        const animal = animals[i];

        // 更新进度
        const percent = ((i + 1) / animals.length * 100).toFixed(0);
        progressBar.style.width = percent + '%';
        stats.textContent = `正在生成: ${i + 1}/${animals.length} (${percent}%)`;

        // 生成像素画
        const pixelData = await emojiToPixelArt(animal.emoji, 128, 8);
        const svg = pixelDataToSVG(pixelData);
        generatedSVGs[animal.name] = svg;

        // 创建卡片
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="emoji-display">${animal.emoji}</div>
          <div class="pixel-canvas">${svg}</div>
          <h3>${animal.name}</h3>
          <button class="download-btn" onclick="downloadSingle('${animal.name}')">
            💾 下载 SVG
          </button>
        `;

        gallery.appendChild(card);

        // 短暂延迟，让浏览器有时间渲染
        await new Promise(resolve => setTimeout(resolve, 50));
      }

      progress.style.display = 'none';
      stats.textContent = `✅ 完成！生成了 ${animals.length} 个像素画`;
    }

    // 下载单个 SVG
    function downloadSingle(name) {
      const svg = generatedSVGs[name];
      if (!svg) {
        alert('请先生成像素画');
        return;
      }

      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${name}.svg`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 批量下载所有 SVG
    async function downloadAllSVG() {
      if (Object.keys(generatedSVGs).length === 0) {
        alert('请先点击"生成所有像素画"按钮');
        return;
      }

      const stats = document.getElementById('stats');
      let count = 0;

      for (const [name, svg] of Object.entries(generatedSVGs)) {
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${name}.svg`;
        a.click();
        URL.revokeObjectURL(url);

        count++;
        stats.textContent = `下载中: ${count}/${animals.length}`;

        await new Promise(resolve => setTimeout(resolve, 200));
      }

      stats.textContent = `✅ 已下载 ${count} 个 SVG 文件！`;
    }

    // 批量下载所有 PNG
    async function downloadAllPNG() {
      if (Object.keys(generatedSVGs).length === 0) {
        alert('请先点击"生成所有像素画"按钮');
        return;
      }

      const stats = document.getElementById('stats');
      let count = 0;

      for (const [name, svg] of Object.entries(generatedSVGs)) {
        const img = new Image();
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);

        await new Promise((resolve) => {
          img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(img, 0, 0, 256, 256);

            canvas.toBlob(function(blob) {
              const pngUrl = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = pngUrl;
              a.download = `${name}.png`;
              a.click();
              URL.revokeObjectURL(pngUrl);

              count++;
              stats.textContent = `下载中: ${count}/${animals.length}`;
              resolve();
            }, 'image/png');

            URL.revokeObjectURL(url);
          };

          img.src = url;
        });

        await new Promise(resolve => setTimeout(resolve, 300));
      }

      stats.textContent = `✅ 已下载 ${count} 个 PNG 文件！`;
    }
  </script>
</body>
</html>
